<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🧽 每日清潔日誌</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'PingFang TC', 'Noto Sans TC', sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  min-height: 100vh; color: #e2e8f0;
}

/* ── Modal ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; padding: 20px;
}
.modal {
  background: #1e293b; border-radius: 20px; padding: 32px;
  width: 100%; max-width: 340px;
  border: 1px solid #334155; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.modal-icon { font-size: 36px; text-align: center; margin-bottom: 12px; }
.modal-title { text-align: center; font-size: 18px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
.modal-sub { text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 20px; }
.modal input {
  width: 100%; padding: 12px 16px; border-radius: 12px;
  border: 1px solid #475569; background: #0f172a;
  color: #f1f5f9; font-size: 15px; outline: none;
  margin-bottom: 12px; font-family: inherit;
}
.modal input:focus { border-color: #3b82f6; }
.btn-primary {
  width: 100%; padding: 12px; border-radius: 12px;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  border: none; color: white; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: inherit; margin-bottom: 8px;
}
.btn-secondary {
  width: 100%; padding: 10px; border-radius: 12px;
  background: transparent; border: 1px solid #334155;
  color: #94a3b8; font-size: 13px; cursor: pointer; font-family: inherit;
}
.btn-danger {
  padding: 6px 14px; border-radius: 8px;
  background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
  color: #f87171; font-size: 12px; cursor: pointer; font-family: inherit;
}
.btn-sm {
  padding: 6px 14px; border-radius: 8px;
  background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3);
  color: #93c5fd; font-size: 12px; cursor: pointer; font-family: inherit;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #1e40af, #4f46e5);
  padding: 24px 20px 28px; position: relative; overflow: hidden;
}
.header::after {
  content: ''; position: absolute; top: -30px; right: -30px;
  width: 120px; height: 120px; border-radius: 50%;
  background: rgba(255,255,255,0.05);
}
.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.header-title { font-size: 22px; font-weight: 800; color: white; }
.header-sub { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; }
.sync-info { font-size: 11px; color: rgba(255,255,255,0.6); text-align: right; }
.name-btn {
  margin-top: 6px; padding: 4px 12px; border-radius: 20px;
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  color: white; font-size: 12px; cursor: pointer; font-family: inherit;
  display: block;
}
.admin-badge {
  display: inline-block; margin-left: 6px;
  background: #f59e0b; color: #000; font-size: 10px;
  padding: 1px 6px; border-radius: 10px; font-weight: 700;
}
.progress-label { display: flex; justify-content: space-between; font-size: 13px; color: rgba(255,255,255,0.8); margin-bottom: 8px; }
.progress-bar-bg { height: 10px; border-radius: 10px; background: rgba(255,255,255,0.2); overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 10px; background: rgba(255,255,255,0.9); transition: width 0.5s ease; }
.progress-bar-fill.done { background: #22c55e; }
.done-msg { text-align: center; margin-top: 10px; font-size: 14px; color: #86efac; font-weight: 700; }

/* ── Tabs ── */
.tabs {
  display: flex; margin: 0 16px; margin-top: -16px;
  background: #1e293b; border-radius: 16px; padding: 4px;
  border: 1px solid #334155; gap: 4px; position: relative; z-index: 1;
}
.tab-btn {
  flex: 1; padding: 10px 0; border-radius: 12px; border: none;
  background: transparent; color: #94a3b8;
  font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.tab-btn.active {
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white; font-weight: 700;
}
.tab-btn.admin-tab.active { background: linear-gradient(135deg, #d97706, #f59e0b); color: #000; }

/* ── Content ── */
.content { padding: 16px; }
.date-label { text-align: center; font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
.area-filter { display: flex; gap: 8px; overflow-x: auto; padding: 8px 0; margin-bottom: 8px; scrollbar-width: none; }
.area-filter::-webkit-scrollbar { display: none; }
.area-btn {
  padding: 6px 14px; border-radius: 20px; border: none;
  white-space: nowrap; background: #334155; color: #94a3b8;
  font-size: 12px; cursor: pointer; flex-shrink: 0; font-family: inherit; transition: all 0.2s;
}
.area-btn.active { background: #3b82f6; color: white; font-weight: 700; }
.items-list { display: flex; flex-direction: column; gap: 10px; }
.item-btn {
  display: flex; align-items: center; gap: 14px; padding: 16px; border-radius: 16px;
  background: #1e293b; border: 1px solid #334155; cursor: pointer;
  text-align: left; width: 100%; transition: all 0.2s; font-family: inherit;
}
.item-btn.checked {
  background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(16,185,129,0.1));
  border-color: rgba(34,197,94,0.4);
}
.check-box {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  background: #334155; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; font-size: 16px; color: white;
}
.check-box.checked { background: #22c55e; }
.item-icon { font-size: 22px; }
.item-info { flex: 1; }
.item-name { font-weight: 600; font-size: 15px; color: #e2e8f0; }
.item-name.checked { color: #86efac; }
.item-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
.me-tag { font-size: 10px; color: #64748b; flex-shrink: 0; }
.refresh-btn {
  width: 100%; margin-top: 16px; padding: 12px; border-radius: 12px;
  border: 1px solid #334155; background: #1e293b; color: #94a3b8;
  font-size: 13px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 6px; font-family: inherit;
}

/* ── History ── */
.history-list { display: flex; flex-direction: column; gap: 10px; }
.history-card {
  padding: 14px 16px; border-radius: 16px; background: #1e293b;
  border: 1px solid #334155; cursor: pointer; text-align: left;
  width: 100%; font-family: inherit; transition: all 0.2s;
}
.history-card.selected { background: rgba(59,130,246,0.15); border-color: #3b82f6; }
.history-row { display: flex; justify-content: space-between; align-items: center; }
.history-date { font-weight: 700; font-size: 14px; color: #e2e8f0; }
.history-count { font-size: 11px; color: #64748b; margin-top: 2px; }
.history-pct { font-size: 16px; font-weight: 800; }
.mini-bar-bg { height: 4px; border-radius: 4px; background: #334155; margin-top: 10px; overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
.detail-box { background: #1e293b; border-radius: 16px; border: 1px solid #334155; padding: 16px; margin-top: 10px; }
.detail-title { font-weight: 700; font-size: 15px; margin-bottom: 12px; color: #e2e8f0; }
.detail-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #0f172a; }
.detail-item:last-child { border-bottom: none; }

/* ── Admin Panel ── */
.admin-section { margin-bottom: 20px; }
.admin-section-title {
  font-size: 13px; font-weight: 700; color: #f59e0b;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
  padding-bottom: 8px; border-bottom: 1px solid #334155;
}
.admin-card {
  background: #1e293b; border: 1px solid #334155;
  border-radius: 12px; padding: 12px 16px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
}
.admin-card-info { flex: 1; }
.admin-card-name { font-size: 14px; font-weight: 600; color: #e2e8f0; }
.admin-card-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
.add-item-form {
  background: #1e293b; border: 1px solid #334155;
  border-radius: 12px; padding: 16px; margin-bottom: 8px;
}
.add-item-form input, .add-item-form select {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  border: 1px solid #475569; background: #0f172a;
  color: #f1f5f9; font-size: 14px; outline: none;
  margin-bottom: 8px; font-family: inherit;
}
.add-item-form input:focus, .add-item-form select:focus { border-color: #3b82f6; }
.add-item-form select option { background: #1e293b; }
.form-row { display: flex; gap: 8px; }
.form-row input { margin-bottom: 0; }
.admin-logout-btn {
  width: 100%; padding: 12px; border-radius: 12px;
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
  color: #f87171; font-size: 14px; cursor: pointer; font-family: inherit;
  margin-top: 8px;
}

/* ── Misc ── */
.empty { text-align: center; padding: 60px; color: #64748b; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.loading { text-align: center; padding: 40px; color: #64748b; }
.admin-tap-zone {
  position: fixed; bottom: 0; right: 0;
  width: 60px; height: 60px; z-index: 50; cursor: default;
}
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
  padding: 10px 20px; border-radius: 20px; font-size: 13px;
  z-index: 300; opacity: 0; transition: opacity 0.3s;
  white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Name Modal -->
<div class="overlay" id="nameModal">
  <div class="modal">
    <div class="modal-icon">👤</div>
    <div class="modal-title">請輸入您的名稱</div>
    <div class="modal-sub">讓隊友知道是誰完成了清潔工作</div>
    <input id="nameInput" placeholder="例如：小明、清潔組A" />
    <button class="btn-primary" onclick="saveName()">確認</button>
  </div>
</div>

<!-- Admin Password Modal -->
<div class="overlay" id="adminModal" style="display:none">
  <div class="modal">
    <div class="modal-icon">🔐</div>
    <div class="modal-title">管理者登入</div>
    <div class="modal-sub">請輸入管理者密碼</div>
    <input id="adminPwInput" type="password" placeholder="密碼" />
    <div id="adminPwError" style="color:#f87171;font-size:12px;text-align:center;margin-bottom:10px;display:none">密碼錯誤，請再試一次</div>
    <button class="btn-primary" onclick="checkAdminPw()">進入管理模式</button>
    <button class="btn-secondary" onclick="closeAdminModal()">取消</button>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-row">
    <div>
      <div class="header-title">🧽 清潔日誌</div>
      <div class="header-sub">多人協作 · 即時同步</div>
    </div>
    <div>
      <div class="sync-info" id="syncInfo">連線中...</div>
      <button class="name-btn" onclick="showNameModal()">
        👤 <span id="nameDisplay">設定名稱</span>
        <span id="adminBadge" class="admin-badge" style="display:none">管理者</span>
      </button>
    </div>
  </div>
  <div id="progressSection">
    <div class="progress-label">
      <span>今日進度</span>
      <span id="progressCount">0 / 0</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
    <div class="done-msg" id="doneMsg" style="display:none">🎉 今日清潔全部完成！</div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs" id="tabsRow">
  <button class="tab-btn active" id="tabToday" onclick="switchTab('today')">📋 今日清潔</button>
  <button class="tab-btn" id="tabHistory" onclick="switchTab('history')">📅 歷史紀錄</button>
  <button class="tab-btn admin-tab" id="tabAdmin" onclick="switchTab('admin')" style="display:none">⚙️ 管理</button>
</div>

<!-- Content -->
<div class="content">
  <!-- Today -->
  <div id="todayPanel">
    <div class="date-label" id="dateLabel"></div>
    <div class="area-filter" id="areaFilter"></div>
    <div id="itemsList" class="items-list"><div class="loading">載入中...</div></div>
    <button class="refresh-btn" onclick="loadAll()">🔄 手動刷新同步</button>
  </div>

  <!-- History -->
  <div id="historyPanel" style="display:none">
    <div id="historyList" class="history-list"><div class="loading">載入中...</div></div>
    <div id="historyDetail"></div>
  </div>

  <!-- Admin -->
  <div id="adminPanel" style="display:none">

    <!-- 清潔項目管理 -->
    <div class="admin-section">
      <div class="admin-section-title">✏️ 清潔項目管理</div>
      <div id="adminItemsList"></div>
      <div class="add-item-form">
        <div style="font-size:13px;color:#94a3b8;margin-bottom:10px;font-weight:600">新增項目</div>
        <div class="form-row">
          <input id="newIcon" placeholder="圖示 🧹" style="width:80px;flex-shrink:0" maxlength="4" />
          <input id="newLabel" placeholder="項目名稱" style="flex:1" />
        </div>
        <select id="newArea">
          <option value="">選擇區域</option>
          <option>全區</option><option>廁所</option><option>辦公區</option>
          <option>廚房</option><option>入口</option>
        </select>
        <input id="newCustomArea" placeholder="或輸入自訂區域名稱（選填）" />
        <button class="btn-primary" onclick="addItem()" style="margin-top:4px">➕ 新增</button>
      </div>
    </div>

    <!-- 使用者管理 -->
    <div class="admin-section">
      <div class="admin-section-title">👥 使用者名單</div>
      <div id="adminUsersList"><div class="loading">載入中...</div></div>
    </div>

    <!-- 紀錄管理 -->
    <div class="admin-section">
      <div class="admin-section-title">🗑️ 紀錄管理</div>
      <div id="adminRecordsList"><div class="loading">載入中...</div></div>
    </div>

    <button class="admin-logout-btn" onclick="adminLogout()">🚪 退出管理模式</button>
  </div>
</div>

<!-- Hidden admin tap zone -->
<div class="admin-tap-zone" id="adminTapZone"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, remove, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCOK7NJml8KR40Z7yrOQVzH5aAUdKA_edo",
  authDomain: "cleaning-app-d9638.firebaseapp.com",
  databaseURL: "https://cleaning-app-d9638-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "cleaning-app-d9638",
  storageBucket: "cleaning-app-d9638.firebasestorage.app",
  messagingSenderId: "422256495385",
  appId: "1:422256495385:web:19650bb0a6fb1c59381388"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── 預設清潔項目（第一次初始化用）──
const DEFAULT_ITEMS = [
  { id: "floor",     icon: "🧹", label: "地板清掃",       area: "全區" },
  { id: "toilet",    icon: "🚽", label: "廁所消毒",       area: "廁所" },
  { id: "sink",      icon: "🚿", label: "洗手台清潔",     area: "廁所" },
  { id: "mirror",    icon: "🪞", label: "鏡面擦拭",       area: "廁所" },
  { id: "trash",     icon: "🗑️", label: "垃圾清除",       area: "全區" },
  { id: "desk",      icon: "🪣", label: "桌面擦拭",       area: "辦公區" },
  { id: "window",    icon: "🪟", label: "窗戶清潔",       area: "辦公區" },
  { id: "kitchen",   icon: "🍳", label: "廚房清潔",       area: "廚房" },
  { id: "fridge",    icon: "🧊", label: "冰箱整理",       area: "廚房" },
  { id: "microwave", icon: "📦", label: "微波爐清潔",     area: "廚房" },
  { id: "entrance",  icon: "🚪", label: "門口掃地",       area: "入口" },
  { id: "disinfect", icon: "🧴", label: "公共區域消毒噴灑", area: "全區" },
];

// ── State ──
let ITEMS = [];
let currentTab = "today";
let filterArea = "全部";
let todayRecord = {};
let allRecords = {};
let allUsers = {};
let selectedHistory = null;
let isAdmin = false;
const ADMIN_PASSWORD = "admin1234"; // ← 可以改成你想要的密碼

function getTodayKey() { return new Date().toISOString().split("T")[0]; }
const TODAY = getTodayKey();

function getUserId() {
  let uid = localStorage.getItem("cleaner_uid");
  if (!uid) { uid = "u_" + Math.random().toString(36).slice(2,8); localStorage.setItem("cleaner_uid", uid); }
  return uid;
}
function getUserName() { return localStorage.getItem("cleaner_name") || ""; }
const UID = getUserId();

function formatDate(d) {
  return new Date(d).toLocaleDateString("zh-TW", { year:"numeric", month:"long", day:"numeric", weekday:"long" });
}
function timeNow() { return new Date().toLocaleTimeString("zh-TW", { hour:"2-digit", minute:"2-digit" }); }

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

// ── Name Modal ──
window.saveName = function() {
  const v = document.getElementById("nameInput").value.trim();
  if (!v) return;
  localStorage.setItem("cleaner_name", v);
  document.getElementById("nameDisplay").textContent = v;
  document.getElementById("nameModal").style.display = "none";
  // 記錄使用者到 Firebase
  set(ref(db, "users/" + UID), { name: v, lastSeen: timeNow(), date: TODAY });
};
window.showNameModal = function() {
  document.getElementById("nameModal").style.display = "flex";
  document.getElementById("nameInput").value = getUserName();
};
document.getElementById("nameInput").addEventListener("keydown", e => { if (e.key === "Enter") window.saveName(); });

if (getUserName()) {
  document.getElementById("nameDisplay").textContent = getUserName();
  document.getElementById("nameModal").style.display = "none";
  set(ref(db, "users/" + UID), { name: getUserName(), lastSeen: timeNow(), date: TODAY });
} else {
  document.getElementById("nameModal").style.display = "flex";
}

// ── Admin Modal ──
window.checkAdminPw = function() {
  const pw = document.getElementById("adminPwInput").value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById("adminModal").style.display = "none";
    document.getElementById("adminPwInput").value = "";
    document.getElementById("adminPwError").style.display = "none";
    document.getElementById("tabAdmin").style.display = "";
    document.getElementById("adminBadge").style.display = "";
    switchTab("admin");
    showToast("✅ 已進入管理模式");
  } else {
    document.getElementById("adminPwError").style.display = "block";
  }
};
window.closeAdminModal = function() {
  document.getElementById("adminModal").style.display = "none";
  document.getElementById("adminPwInput").value = "";
  document.getElementById("adminPwError").style.display = "none";
};
window.adminLogout = function() {
  isAdmin = false;
  document.getElementById("tabAdmin").style.display = "none";
  document.getElementById("adminBadge").style.display = "none";
  switchTab("today");
  showToast("已退出管理模式");
};

// ── Admin tap zone (點右下角5下觸發) ──
let tapCount = 0, tapTimer = null;
document.getElementById("adminTapZone").addEventListener("click", () => {
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => tapCount = 0, 2000);
  if (tapCount >= 5) {
    tapCount = 0;
    if (isAdmin) { adminLogout(); return; }
    document.getElementById("adminModal").style.display = "flex";
    setTimeout(() => document.getElementById("adminPwInput").focus(), 100);
  }
});

// ── Date label ──
document.getElementById("dateLabel").textContent = formatDate(TODAY);

// ── Firebase: Load Items ──
function listenItems() {
  onValue(ref(db, "items"), snap => {
    const data = snap.val();
    if (data) {
      ITEMS = Object.values(data).sort((a,b) => (a.order||0)-(b.order||0));
    } else {
      // 初始化預設項目
      const obj = {};
      DEFAULT_ITEMS.forEach((item, i) => { obj[item.id] = { ...item, order: i }; });
      set(ref(db, "items"), obj);
      ITEMS = DEFAULT_ITEMS.map((item,i) => ({ ...item, order: i }));
    }
    renderAreaFilter();
    renderItems();
    updateProgress();
    if (currentTab === "admin") renderAdminItems();
  });
}

// ── Firebase: Load Records ──
function listenRecords() {
  onValue(ref(db, "records"), snap => {
    allRecords = snap.val() || {};
    todayRecord = allRecords[TODAY] || {};
    renderItems();
    updateProgress();
    if (currentTab === "history") renderHistory();
    if (currentTab === "admin") renderAdminRecords();
    updateSyncTime();
  });
}

// ── Firebase: Load Users ──
function listenUsers() {
  onValue(ref(db, "users"), snap => {
    allUsers = snap.val() || {};
    if (currentTab === "admin") renderAdminUsers();
  });
}

window.loadAll = function() {
  document.getElementById("syncInfo").textContent = "🔄 刷新中...";
  get(ref(db, "records/" + TODAY)).then(snap => {
    todayRecord = snap.val() || {};
    renderItems(); updateProgress(); updateSyncTime();
  });
};

function updateSyncTime() {
  const t = new Date().toLocaleTimeString("zh-TW", { hour:"2-digit", minute:"2-digit" });
  document.getElementById("syncInfo").textContent = `✅ ${t} 已同步`;
}

// ── Toggle check ──
window.toggleItem = async function(itemId) {
  const name = getUserName();
  if (!name) { window.showNameModal(); return; }
  const current = todayRecord[itemId];
  const newRecord = { ...todayRecord };
  if (current) { delete newRecord[itemId]; }
  else { newRecord[itemId] = { by: name, uid: UID, time: timeNow() }; }
  todayRecord = newRecord;
  allRecords[TODAY] = newRecord;
  renderItems(); updateProgress();
  await set(ref(db, "records/" + TODAY), newRecord);
};

// ── Area Filter ──
function renderAreaFilter() {
  const areas = ["全部", ...new Set(ITEMS.map(i => i.area))];
  const el = document.getElementById("areaFilter");
  el.innerHTML = areas.map(area => `
    <button class="area-btn ${filterArea === area ? 'active' : ''}" onclick="setArea('${area}')">${area}</button>
  `).join('');
}
window.setArea = function(area) {
  filterArea = area;
  renderAreaFilter();
  renderItems();
};

// ── Render Items ──
function renderItems() {
  const list = document.getElementById("itemsList");
  if (ITEMS.length === 0) { list.innerHTML = '<div class="loading">載入中...</div>'; return; }
  const filtered = filterArea === "全部" ? ITEMS : ITEMS.filter(i => i.area === filterArea);
  list.innerHTML = filtered.map(item => {
    const info = todayRecord[item.id];
    const checked = !!info;
    const isMe = info && info.uid === UID;
    return `
      <button class="item-btn ${checked ? 'checked' : ''}" onclick="toggleItem('${item.id}')">
        <div class="check-box ${checked ? 'checked' : ''}">${checked ? '✓' : '○'}</div>
        <div class="item-icon">${item.icon}</div>
        <div class="item-info">
          <div class="item-name ${checked ? 'checked' : ''}">${item.label}</div>
          <div class="item-sub">${checked ? `✅ ${info.by} 完成於 ${info.time}` : `📍 ${item.area}`}</div>
        </div>
        ${isMe ? '<span class="me-tag">（我）</span>' : ''}
      </button>`;
  }).join('');
}

// ── Progress ──
function updateProgress() {
  const total = ITEMS.length;
  const cnt = Object.keys(todayRecord).length;
  const pct = total > 0 ? Math.round(cnt / total * 100) : 0;
  document.getElementById("progressCount").textContent = `${cnt} / ${total}`;
  const bar = document.getElementById("progressBar");
  bar.style.width = pct + "%";
  bar.className = "progress-bar-fill" + (pct === 100 ? " done" : "");
  document.getElementById("doneMsg").style.display = (pct === 100 && total > 0) ? "block" : "none";
}

// ── Tab Switch ──
window.switchTab = function(tab) {
  currentTab = tab;
  ["today","history","admin"].forEach(t => {
    document.getElementById(t+"Panel").style.display = t === tab ? "block" : "none";
    const btn = document.getElementById("tab"+t.charAt(0).toUpperCase()+t.slice(1));
    if (btn) btn.className = "tab-btn" + (t === tab ? " active" : "") + (t === "admin" ? " admin-tab" : "");
  });
  document.getElementById("progressSection").style.display = tab === "today" ? "block" : "none";
  if (tab === "history") renderHistory();
  if (tab === "admin") { renderAdminItems(); renderAdminUsers(); renderAdminRecords(); }
};

// ── History ──
function renderHistory() {
  const dates = Object.keys(allRecords).sort().reverse();
  const list = document.getElementById("historyList");
  if (dates.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>尚無歷史紀錄</div></div>';
    return;
  }
  const total = ITEMS.length;
  list.innerHTML = dates.map(date => {
    const rec = allRecords[date] || {};
    const cnt = Object.keys(rec).length;
    const pct = total > 0 ? Math.round(cnt / total * 100) : 0;
    const color = pct === 100 ? "#22c55e" : pct >= 50 ? "#f59e0b" : "#ef4444";
    const isToday = date === TODAY;
    return `
      <button class="history-card ${selectedHistory === date ? 'selected' : ''}" onclick="selectHistory('${date}')">
        <div class="history-row">
          <div>
            <div class="history-date">${isToday ? "📌 今天 · " : ""}${formatDate(date).slice(0,12)}</div>
            <div class="history-count">完成 ${cnt} / ${total} 項</div>
          </div>
          <div style="text-align:right">
            <div class="history-pct" style="color:${color}">${pct}%</div>
            <div style="font-size:10px;color:#64748b">完成率</div>
          </div>
        </div>
        <div class="mini-bar-bg">
          <div class="mini-bar-fill" style="width:${pct}%;background:${pct===100?'#22c55e':'#3b82f6'}"></div>
        </div>
      </button>`;
  }).join('');
  renderHistoryDetail();
}

window.selectHistory = function(date) {
  selectedHistory = selectedHistory === date ? null : date;
  renderHistory();
};

function renderHistoryDetail() {
  const el = document.getElementById("historyDetail");
  if (!selectedHistory) { el.innerHTML = ""; return; }
  const rec = allRecords[selectedHistory] || {};
  el.innerHTML = `
    <div class="detail-box">
      <div class="detail-title">📋 ${formatDate(selectedHistory)} 詳細紀錄</div>
      ${ITEMS.map(item => {
        const info = rec[item.id];
        return `
          <div class="detail-item">
            <span style="font-size:18px">${item.icon}</span>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:${info?600:400};color:${info?'#86efac':'#64748b'}">${item.label}</div>
              ${info ? `<div style="font-size:11px;color:#64748b">${info.by} · ${info.time}</div>` : ''}
            </div>
            <span>${info ? "✅" : "⬜"}</span>
          </div>`;
      }).join('')}
    </div>`;
}

// ── Admin: Items ──
function renderAdminItems() {
  const el = document.getElementById("adminItemsList");
  if (ITEMS.length === 0) { el.innerHTML = '<div class="loading">尚無項目</div>'; return; }
  el.innerHTML = ITEMS.map(item => `
    <div class="admin-card">
      <span style="font-size:20px">${item.icon}</span>
      <div class="admin-card-info">
        <div class="admin-card-name">${item.label}</div>
        <div class="admin-card-sub">📍 ${item.area}</div>
      </div>
      <button class="btn-danger" onclick="deleteItem('${item.id}')">刪除</button>
    </div>
  `).join('');
}

window.addItem = async function() {
  const icon = document.getElementById("newIcon").value.trim() || "🔹";
  const label = document.getElementById("newLabel").value.trim();
  const areaSelect = document.getElementById("newArea").value;
  const areaCustom = document.getElementById("newCustomArea").value.trim();
  const area = areaCustom || areaSelect;
  if (!label || !area) { showToast("⚠️ 請填寫項目名稱和區域"); return; }
  const id = "item_" + Date.now();
  const order = ITEMS.length;
  await set(ref(db, "items/" + id), { id, icon, label, area, order });
  document.getElementById("newIcon").value = "";
  document.getElementById("newLabel").value = "";
  document.getElementById("newArea").value = "";
  document.getElementById("newCustomArea").value = "";
  showToast("✅ 已新增：" + label);
};

window.deleteItem = async function(itemId) {
  if (!confirm("確定要刪除這個清潔項目嗎？\n（歷史紀錄中的勾選資料不會被刪除）")) return;
  await remove(ref(db, "items/" + itemId));
  showToast("🗑️ 已刪除項目");
};

// ── Admin: Users ──
function renderAdminUsers() {
  const el = document.getElementById("adminUsersList");
  const users = Object.entries(allUsers);
  if (users.length === 0) { el.innerHTML = '<div style="color:#64748b;font-size:13px;padding:8px">尚無使用者紀錄</div>'; return; }
  el.innerHTML = users.map(([uid, u]) => `
    <div class="admin-card">
      <span style="font-size:20px">👤</span>
      <div class="admin-card-info">
        <div class="admin-card-name">${u.name}</div>
        <div class="admin-card-sub">最後活動：${u.date} ${u.lastSeen}</div>
      </div>
      <button class="btn-danger" onclick="deleteUser('${uid}', '${u.name}')">刪除</button>
    </div>
  `).join('');
}

window.deleteUser = async function(uid, name) {
  if (!confirm(`確定要刪除使用者「${name}」嗎？\n（其清潔紀錄資料仍會保留）`)) return;
  await remove(ref(db, "users/" + uid));
  showToast("🗑️ 已刪除使用者：" + name);
};

// ── Admin: Records ──
function renderAdminRecords() {
  const el = document.getElementById("adminRecordsList");
  const dates = Object.keys(allRecords).sort().reverse();
  if (dates.length === 0) { el.innerHTML = '<div style="color:#64748b;font-size:13px;padding:8px">尚無紀錄</div>'; return; }
  el.innerHTML = dates.map(date => {
    const cnt = Object.keys(allRecords[date] || {}).length;
    const isToday = date === TODAY;
    return `
      <div class="admin-card">
        <span style="font-size:20px">📅</span>
        <div class="admin-card-info">
          <div class="admin-card-name">${isToday ? "📌 今天 " : ""}${date}</div>
          <div class="admin-card-sub">已完成 ${cnt} 項</div>
        </div>
        <button class="btn-danger" onclick="deleteRecord('${date}')">刪除</button>
      </div>`;
  }).join('');
}

window.deleteRecord = async function(date) {
  if (!confirm(`確定要刪除 ${date} 的全部清潔紀錄嗎？\n此操作無法復原。`)) return;
  await remove(ref(db, "records/" + date));
  if (date === TODAY) todayRecord = {};
  showToast("🗑️ 已刪除 " + date + " 的紀錄");
};

// ── Init ──
listenItems();
listenRecords();
listenUsers();
updateProgress();
</script>
</body>
</html>
