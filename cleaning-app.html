<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🧽 每日清潔日誌</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'PingFang TC', 'Noto Sans TC', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    min-height: 100vh;
    color: #e2e8f0;
  }
  .header {
    background: linear-gradient(135deg, #1e40af, #4f46e5);
    padding: 24px 20px 28px;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .header-title { font-size: 22px; font-weight: 800; color: white; }
  .header-sub { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; }
  .sync-info { font-size: 11px; color: rgba(255,255,255,0.6); text-align: right; }
  .name-btn {
    margin-top: 6px; padding: 4px 12px; border-radius: 20px;
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: white; font-size: 12px; cursor: pointer;
  }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 13px; color: rgba(255,255,255,0.8); margin-bottom: 8px;
  }
  .progress-bar-bg {
    height: 10px; border-radius: 10px;
    background: rgba(255,255,255,0.2); overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 10px;
    background: rgba(255,255,255,0.9);
    transition: width 0.5s ease;
  }
  .progress-bar-fill.done { background: #22c55e; }
  .done-msg {
    text-align: center; margin-top: 10px;
    font-size: 14px; color: #86efac; font-weight: 700;
  }
  .tabs {
    display: flex; margin: 0 16px; margin-top: -16px;
    background: #1e293b; border-radius: 16px; padding: 4px;
    border: 1px solid #334155; gap: 4px;
  }
  .tab-btn {
    flex: 1; padding: 10px 0; border-radius: 12px; border: none;
    background: transparent; color: #94a3b8;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
    font-family: inherit;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: white; font-weight: 700;
  }
  .content { padding: 16px; }
  .date-label {
    text-align: center; font-size: 13px;
    color: #94a3b8; margin-bottom: 8px;
  }
  .area-filter {
    display: flex; gap: 8px; overflow-x: auto;
    padding: 8px 0; margin-bottom: 8px;
    scrollbar-width: none;
  }
  .area-filter::-webkit-scrollbar { display: none; }
  .area-btn {
    padding: 6px 14px; border-radius: 20px; border: none;
    white-space: nowrap; background: #334155;
    color: #94a3b8; font-size: 12px; cursor: pointer;
    flex-shrink: 0; font-family: inherit;
    transition: all 0.2s;
  }
  .area-btn.active { background: #3b82f6; color: white; font-weight: 700; }
  .items-list { display: flex; flex-direction: column; gap: 10px; }
  .item-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 16px; border-radius: 16px;
    background: #1e293b; border: 1px solid #334155;
    cursor: pointer; text-align: left; width: 100%;
    transition: all 0.2s; font-family: inherit;
  }
  .item-btn.checked {
    background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(16,185,129,0.1));
    border-color: rgba(34,197,94,0.4);
  }
  .check-box {
    width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
    background: #334155; display: flex; align-items: center;
    justify-content: center; transition: all 0.2s; font-size: 16px;
  }
  .check-box.checked { background: #22c55e; color: white; }
  .item-icon { font-size: 22px; }
  .item-info { flex: 1; }
  .item-name { font-weight: 600; font-size: 15px; color: #e2e8f0; }
  .item-name.checked { color: #86efac; }
  .item-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
  .me-tag { font-size: 10px; color: #64748b; flex-shrink: 0; }
  .refresh-btn {
    width: 100%; margin-top: 16px; padding: 12px;
    border-radius: 12px; border: 1px solid #334155;
    background: #1e293b; color: #94a3b8; font-size: 13px;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 6px; font-family: inherit;
  }
  .history-list { display: flex; flex-direction: column; gap: 10px; }
  .history-item {
    padding: 14px 16px; border-radius: 16px;
    background: #1e293b; border: 1px solid #334155;
    cursor: pointer; text-align: left; width: 100%;
    font-family: inherit;
  }
  .history-item.selected {
    background: rgba(59,130,246,0.15);
    border-color: #3b82f6;
  }
  .history-row {
    display: flex; justify-content: space-between; align-items: center;
  }
  .history-date { font-weight: 700; font-size: 14px; color: #e2e8f0; }
  .history-count { font-size: 11px; color: #64748b; margin-top: 2px; }
  .history-pct { font-size: 16px; font-weight: 800; }
  .history-pct-label { font-size: 10px; color: #64748b; }
  .mini-bar-bg {
    height: 4px; border-radius: 4px;
    background: #334155; margin-top: 10px; overflow: hidden;
  }
  .mini-bar-fill {
    height: 100%; border-radius: 4px;
    transition: width 0.5s;
  }
  .detail-box {
    background: #1e293b; border-radius: 16px;
    border: 1px solid #334155; padding: 16px; margin-top: 10px;
  }
  .detail-title { font-weight: 700; font-size: 15px; margin-bottom: 12px; color: #e2e8f0; }
  .detail-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid #0f172a;
  }
  .detail-name { font-size: 13px; }
  .detail-name.done { color: #86efac; font-weight: 600; }
  .detail-name.undone { color: #64748b; }
  .detail-who { font-size: 11px; color: #64748b; }
  .empty {
    text-align: center; padding: 60px; color: #64748b;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-box {
    background: #1e293b; border-radius: 20px; padding: 36px; width: 320px;
    border: 1px solid #334155; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-icon { font-size: 36px; text-align: center; margin-bottom: 12px; }
  .modal-title { text-align: center; font-size: 18px; font-weight: 700; margin-bottom: 8px; color: #f1f5f9; }
  .modal-sub { text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 20px; }
  .modal-input {
    width: 100%; padding: 12px 16px; border-radius: 12px;
    border: 1px solid #475569; background: #0f172a;
    color: #f1f5f9; font-size: 15px; outline: none;
    margin-bottom: 16px; font-family: inherit;
  }
  .modal-btn {
    width: 100%; padding: 12px; border-radius: 12px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border: none; color: white; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .loading { text-align: center; padding: 40px; color: #64748b; }
</style>
</head>
<body>

<div id="nameModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-icon">👤</div>
    <div class="modal-title">請輸入您的名稱</div>
    <div class="modal-sub">讓隊友知道是誰完成了清潔工作</div>
    <input id="nameInput" class="modal-input" placeholder="例如：小明、清潔組A" />
    <button class="modal-btn" onclick="saveName()">確認</button>
  </div>
</div>

<div class="header">
  <div class="header-row">
    <div>
      <div class="header-title">🧽 清潔日誌</div>
      <div class="header-sub">多人協作 · 即時同步</div>
    </div>
    <div>
      <div class="sync-info" id="syncInfo">連線中...</div>
      <button class="name-btn" onclick="showNameModal()">👤 <span id="nameDisplay">設定名稱</span></button>
    </div>
  </div>
  <div id="progressSection">
    <div class="progress-label">
      <span>今日進度</span>
      <span id="progressCount">0 / 12</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
    <div class="done-msg" id="doneMsg" style="display:none">🎉 今日清潔全部完成！</div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tabToday" onclick="switchTab('today')">📋 今日清潔</button>
  <button class="tab-btn" id="tabHistory" onclick="switchTab('history')">📅 歷史紀錄</button>
</div>

<div class="content">
  <div id="todayPanel">
    <div class="date-label" id="dateLabel"></div>
    <div class="area-filter" id="areaFilter"></div>
    <div id="itemsList" class="items-list"><div class="loading">載入中...</div></div>
    <button class="refresh-btn" onclick="loadData()">🔄 手動刷新同步</button>
  </div>

  <div id="historyPanel" style="display:none">
    <div id="historyList" class="history-list"><div class="loading">載入中...</div></div>
    <div id="historyDetail"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCOK7NJml8KR40Z7yrOQVzH5aAUdKA_edo",
  authDomain: "cleaning-app-d9638.firebaseapp.com",
  databaseURL: "https://cleaning-app-d9638-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "cleaning-app-d9638",
  storageBucket: "cleaning-app-d9638.firebasestorage.app",
  messagingSenderId: "422256495385",
  appId: "1:422256495385:web:19650bb0a6fb1c59381388"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ITEMS = [
  { id: "floor",     icon: "🧹", label: "地板清掃",       area: "全區" },
  { id: "toilet",    icon: "🚽", label: "廁所消毒",       area: "廁所" },
  { id: "sink",      icon: "🚿", label: "洗手台清潔",     area: "廁所" },
  { id: "mirror",    icon: "🪞", label: "鏡面擦拭",       area: "廁所" },
  { id: "trash",     icon: "🗑️", label: "垃圾清除",       area: "全區" },
  { id: "desk",      icon: "🪣", label: "桌面擦拭",       area: "辦公區" },
  { id: "window",    icon: "🪟", label: "窗戶清潔",       area: "辦公區" },
  { id: "kitchen",   icon: "🍳", label: "廚房清潔",       area: "廚房" },
  { id: "fridge",    icon: "🧊", label: "冰箱整理",       area: "廚房" },
  { id: "microwave", icon: "📦", label: "微波爐清潔",     area: "廚房" },
  { id: "entrance",  icon: "🚪", label: "門口掃地",       area: "入口" },
  { id: "disinfect", icon: "🧴", label: "公共區域消毒噴灑", area: "全區" },
];
const AREAS = ["全部", ...new Set(ITEMS.map(i => i.area))];

let currentTab = "today";
let filterArea = "全部";
let todayRecord = {};
let allRecords = {};
let selectedHistory = null;

function getTodayKey() {
  return new Date().toISOString().split("T")[0];
}
const TODAY = getTodayKey();

function getUserId() {
  let uid = localStorage.getItem("cleaner_uid");
  if (!uid) { uid = "u_" + Math.random().toString(36).slice(2,8); localStorage.setItem("cleaner_uid", uid); }
  return uid;
}
function getUserName() { return localStorage.getItem("cleaner_name") || ""; }
const UID = getUserId();

function formatDate(d) {
  return new Date(d).toLocaleDateString("zh-TW", { year:"numeric", month:"long", day:"numeric", weekday:"long" });
}
function timeNow() {
  return new Date().toLocaleTimeString("zh-TW", { hour:"2-digit", minute:"2-digit" });
}

// --- Name modal ---
window.saveName = function() {
  const v = document.getElementById("nameInput").value.trim();
  if (!v) return;
  localStorage.setItem("cleaner_name", v);
  document.getElementById("nameDisplay").textContent = v;
  document.getElementById("nameModal").style.display = "none";
};
window.showNameModal = function() {
  document.getElementById("nameModal").style.display = "flex";
  document.getElementById("nameInput").value = getUserName();
};
document.getElementById("nameInput").addEventListener("keydown", e => { if (e.key === "Enter") window.saveName(); });

if (getUserName()) {
  document.getElementById("nameDisplay").textContent = getUserName();
  document.getElementById("nameModal").style.display = "none";
} else {
  document.getElementById("nameModal").style.display = "flex";
}

// --- Date label ---
document.getElementById("dateLabel").textContent = formatDate(TODAY);

// --- Area filter ---
const areaFilter = document.getElementById("areaFilter");
AREAS.forEach(area => {
  const btn = document.createElement("button");
  btn.className = "area-btn" + (area === "全部" ? " active" : "");
  btn.textContent = area;
  btn.onclick = () => {
    filterArea = area;
    document.querySelectorAll(".area-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderItems();
  };
  areaFilter.appendChild(btn);
});

// --- Firebase realtime listener ---
function listenToday() {
  const r = ref(db, "records/" + TODAY);
  onValue(r, snap => {
    todayRecord = snap.val() || {};
    allRecords[TODAY] = todayRecord;
    renderItems();
    updateProgress();
    updateSyncTime();
  });
}

function listenHistory() {
  const r = ref(db, "records");
  onValue(r, snap => {
    allRecords = snap.val() || {};
    if (currentTab === "history") renderHistory();
  });
}

window.loadData = function() {
  document.getElementById("syncInfo").textContent = "🔄 刷新中...";
  get(ref(db, "records/" + TODAY)).then(snap => {
    todayRecord = snap.val() || {};
    allRecords[TODAY] = todayRecord;
    renderItems();
    updateProgress();
    updateSyncTime();
  });
  get(ref(db, "records")).then(snap => {
    allRecords = snap.val() || {};
    if (currentTab === "history") renderHistory();
  });
};

function updateSyncTime() {
  const t = new Date().toLocaleTimeString("zh-TW", { hour:"2-digit", minute:"2-digit" });
  document.getElementById("syncInfo").textContent = `✅ ${t} 已同步`;
}

// --- Toggle check ---
window.toggleItem = async function(itemId) {
  const name = getUserName();
  if (!name) { window.showNameModal(); return; }
  const current = todayRecord[itemId];
  const newRecord = { ...todayRecord };
  if (current) { delete newRecord[itemId]; }
  else { newRecord[itemId] = { by: name, uid: UID, time: timeNow() }; }
  todayRecord = newRecord;
  allRecords[TODAY] = newRecord;
  renderItems();
  updateProgress();
  await set(ref(db, "records/" + TODAY), newRecord);
};

// --- Render items ---
function renderItems() {
  const list = document.getElementById("itemsList");
  const filtered = filterArea === "全部" ? ITEMS : ITEMS.filter(i => i.area === filterArea);
  list.innerHTML = filtered.map(item => {
    const info = todayRecord[item.id];
    const checked = !!info;
    const isMe = info && info.uid === UID;
    return `
      <button class="item-btn ${checked ? 'checked' : ''}" onclick="toggleItem('${item.id}')">
        <div class="check-box ${checked ? 'checked' : ''}">${checked ? '✓' : '○'}</div>
        <div class="item-icon">${item.icon}</div>
        <div class="item-info">
          <div class="item-name ${checked ? 'checked' : ''}">${item.label}</div>
          <div class="item-sub">${checked ? `✅ ${info.by} 完成於 ${info.time}` : `📍 ${item.area}`}</div>
        </div>
        ${isMe ? '<span class="me-tag">（我）</span>' : ''}
      </button>`;
  }).join('');
}

// --- Progress ---
function updateProgress() {
  const cnt = Object.keys(todayRecord).length;
  const total = ITEMS.length;
  const pct = Math.round(cnt / total * 100);
  document.getElementById("progressCount").textContent = `${cnt} / ${total}`;
  const bar = document.getElementById("progressBar");
  bar.style.width = pct + "%";
  bar.className = "progress-bar-fill" + (pct === 100 ? " done" : "");
  document.getElementById("doneMsg").style.display = pct === 100 ? "block" : "none";
}

// --- Tab switch ---
window.switchTab = function(tab) {
  currentTab = tab;
  document.getElementById("tabToday").className = "tab-btn" + (tab === "today" ? " active" : "");
  document.getElementById("tabHistory").className = "tab-btn" + (tab === "history" ? " active" : "");
  document.getElementById("todayPanel").style.display = tab === "today" ? "block" : "none";
  document.getElementById("historyPanel").style.display = tab === "history" ? "block" : "none";
  document.getElementById("progressSection").style.display = tab === "today" ? "block" : "none";
  if (tab === "history") renderHistory();
};

// --- Render history ---
function renderHistory() {
  const dates = Object.keys(allRecords).sort().reverse();
  const list = document.getElementById("historyList");
  if (dates.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>尚無歷史紀錄</div></div>';
    return;
  }
  list.innerHTML = dates.map(date => {
    const rec = allRecords[date] || {};
    const cnt = Object.keys(rec).length;
    const pct = Math.round(cnt / ITEMS.length * 100);
    const color = pct === 100 ? "#22c55e" : pct >= 50 ? "#f59e0b" : "#ef4444";
    const barColor = pct === 100 ? "#22c55e" : "#3b82f6";
    const isToday = date === TODAY;
    const label = formatDate(date).replace(" ", "").slice(0,12);
    return `
      <button class="history-item ${selectedHistory === date ? 'selected' : ''}" onclick="selectHistory('${date}')">
        <div class="history-row">
          <div>
            <div class="history-date">${isToday ? "📌 今天 · " : ""}${label}</div>
            <div class="history-count">完成 ${cnt} / ${ITEMS.length} 項</div>
          </div>
          <div style="text-align:right">
            <div class="history-pct" style="color:${color}">${pct}%</div>
            <div class="history-pct-label">完成率</div>
          </div>
        </div>
        <div class="mini-bar-bg">
          <div class="mini-bar-fill" style="width:${pct}%;background:${barColor}"></div>
        </div>
      </button>`;
  }).join('');

  renderHistoryDetail();
}

window.selectHistory = function(date) {
  selectedHistory = selectedHistory === date ? null : date;
  renderHistory();
};

function renderHistoryDetail() {
  const detail = document.getElementById("historyDetail");
  if (!selectedHistory) { detail.innerHTML = ""; return; }
  const rec = allRecords[selectedHistory] || {};
  detail.innerHTML = `
    <div class="detail-box">
      <div class="detail-title">📋 ${formatDate(selectedHistory)} 詳細紀錄</div>
      ${ITEMS.map(item => {
        const info = rec[item.id];
        return `
          <div class="detail-item">
            <span style="font-size:18px">${item.icon}</span>
            <div style="flex:1">
              <div class="detail-name ${info ? 'done' : 'undone'}">${item.label}</div>
              ${info ? `<div class="detail-who">${info.by} · ${info.time}</div>` : ''}
            </div>
            <span>${info ? "✅" : "⬜"}</span>
          </div>`;
      }).join('')}
    </div>`;
}

// --- Init ---
listenToday();
listenHistory();
updateProgress();
</script>
</body>
</html>
